[project]
name = "mybookkeeper-backend"
version = "0.1.0"
description = "MyBookkeeper FastAPI backend — AI-powered invoice extraction and bookkeeping for rental properties."
requires-python = "==3.12.*"
dependencies = [
    "fastapi>=0.118,<0.140",
    "starlette>=1.0,<2.0",
    "uvicorn[standard]==0.30.0",
    "sqlalchemy==2.0.36",
    "alembic==1.13.3",
    "asyncpg==0.30.0",
    "psycopg2-binary==2.9.10",
    "pydantic==2.9.0",
    "pydantic-settings==2.5.0",
    "email-validator==2.1.2",
    "fastapi-users[sqlalchemy]==15.0.5",
    "fastapi-users-db-sqlalchemy==7.0.0",
    "anthropic==0.34.0",
    "google-api-python-client==2.143.0",
    "google-auth-httplib2==0.2.0",
    "google-auth-oauthlib==1.2.1",
    "dramatiq[postgres]==2.1.0",
    "cryptography>=47",
    "python-multipart==0.0.26",
    "passlib[bcrypt]==1.7.4",
    "aiofiles>=25",
    "pypdf>=5.6",
    "mammoth==1.11.0",
    "openpyxl==3.1.5",
    "python-dotenv==1.2.2",
    "httpx==0.27.0",
    "minio==7.2.15",
    "reportlab==4.4.10",
    "sentry-sdk[fastapi]==2.19.2",
    "pyotp==2.9.0",
    "qrcode[pil]==8.0",
    "pyjwt[crypto]>=2.10",
]

[tool.uv]
package = false
