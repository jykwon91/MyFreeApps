# GENERATED FROM infra/templates/docker-compose.yml.j2 — DO NOT EDIT.
# Edit the template + apps/<app>/app.yaml; re-render via:
#   python -m platform_shared.infra.render --app mybookkeeper

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Resource caps — blast-radius containment on a small shared VPS. The apps
    # share one host with no swap headroom, so a single runaway/compromised
    # container must not exhaust RAM and trigger the kernel OOM-killer against a
    # sibling app's Postgres (the open blast-radius gap this closes). These are
    # CEILINGS, not reservations — sized well above observed steady-state working
    # sets, so the lighter apps never approach them. They pair with a host swap
    # file (see the PR's operational notes): with swap present, a container that
    # reaches its mem_limit soft-lands into swap instead of an instant hard kill.
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    environment:
      POSTGRES_USER: mybookkeeper
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mybookkeeper
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mybookkeeper"]
      interval: 5s
      timeout: 3s
      retries: 10
      # initdb on a cold start can take 10–20s; without start_period the
      # early pg_isready failures count toward retries and Docker reports
      # the container "unhealthy" before postgres has bound the socket.
      # Dependent services (migrate, api) then bail before postgres is ready.
      start_period: 30s

  migrate:
    image: ghcr.io/jykwon91/myfreeapps-mybookkeeper-backend:${IMAGE_TAG:-latest}
    command: ["alembic", "upgrade", "head"]
    # One-shot migration — caps guard a runaway migration, not steady state.
    mem_limit: 512m
    cpus: 1.5
    pids_limit: 128
    # format: raw (compose >= 2.30) — values are literal, never interpolated.
    # Default env_file parsing expands $-sequences, which silently corrupts
    # bcrypt hashes (SEED_*_PASSWORD_HASH: "$2b$12$<salt>..." loses everything
    # after the first $<alnum-run> to a blank-variable substitution).
    env_file:
      - path: backend/.env.docker
        format: raw
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ghcr.io/jykwon91/myfreeapps-mybookkeeper-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Highest single consumer on the box (the busiest app's API steady-states
    # well under this); cap leaves headroom for request-handling spikes while
    # still bounding a runaway. See the postgres service for the full rationale.
    mem_limit: 1024m
    cpus: 1.5
    pids_limit: 256
    # format: raw (compose >= 2.30) — values are literal, never interpolated.
    # Default env_file parsing expands $-sequences, which silently corrupts
    # bcrypt hashes (SEED_*_PASSWORD_HASH: "$2b$12$<salt>..." loses everything
    # after the first $<alnum-run> to a blank-variable substitution).
    env_file:
      - path: backend/.env.docker
        format: raw
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
      RUN_UPLOAD_WORKER: "false"
      # MinIO connection — points at the shared infra/ stack's
      # ``myfreeapps-minio`` container reachable via the shared
      # ``myfreeapps`` external network.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET}
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - default
      - myfreeapps
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  upload-processor:
    image: ghcr.io/jykwon91/myfreeapps-mybookkeeper-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["python", "-m", "app.workers.upload_processor_worker"]
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    # format: raw (compose >= 2.30) — values are literal, never interpolated.
    # Default env_file parsing expands $-sequences, which silently corrupts
    # bcrypt hashes (SEED_*_PASSWORD_HASH: "$2b$12$<salt>..." loses everything
    # after the first $<alnum-run> to a blank-variable substitution).
    env_file:
      - path: backend/.env.docker
        format: raw
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
      # Workers read/write document files in MinIO (extraction downloads by
      # file_storage_key; email sync stores attachments), so they need the same
      # MinIO credentials as the api — without them the worker raises
      # StorageNotConfiguredError on every storage-backed document.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - default
      - myfreeapps

  scheduler:
    image: ghcr.io/jykwon91/myfreeapps-mybookkeeper-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["python", "-m", "app.workers.scheduler_worker"]
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    # format: raw (compose >= 2.30) — values are literal, never interpolated.
    # Default env_file parsing expands $-sequences, which silently corrupts
    # bcrypt hashes (SEED_*_PASSWORD_HASH: "$2b$12$<salt>..." loses everything
    # after the first $<alnum-run> to a blank-variable substitution).
    env_file:
      - path: backend/.env.docker
        format: raw
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
      # Workers read/write document files in MinIO (extraction downloads by
      # file_storage_key; email sync stores attachments), so they need the same
      # MinIO credentials as the api — without them the worker raises
      # StorageNotConfiguredError on every storage-backed document.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - default
      - myfreeapps

  caddy:
    # Custom image: caddy:2-alpine + freshly-built frontend dist baked in
    # at /srv/frontend + Caddyfile baked at /etc/caddy/Caddyfile. No shared
    # volume, no entrypoint copy, no drift between deploys. See
    # docker/caddy.Dockerfile for the full rationale.
    # Registry path: this image is built + pushed by the deploy workflow's
    # build-and-push job (VITE_* build args sourced from GitHub Actions vars
    # there, not the VPS .env.docker). The VPS pulls it; no on-box build.
    image: ghcr.io/jykwon91/myfreeapps-mybookkeeper-caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 64
    ports:
      # Bind only to localhost — host Caddy is the public front door and proxies here.
      - "127.0.0.1:8094:80"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default
      - myfreeapps

volumes:
  pg_data:
  caddy_data:
  caddy_config:

networks:
  # Per-app default network for postgres + migrate + workers.
  default:
  # Shared external network owned by infra/docker-compose.yml — joined
  # by services that need to reach myfreeapps-minio. Bring up the infra
  # stack first or compose-up will fail with "network myfreeapps not found".
  myfreeapps:
    external: true
