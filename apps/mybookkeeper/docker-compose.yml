services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: mybookkeeper
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mybookkeeper
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mybookkeeper"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    # SHA-pinned via tag — verified against Docker Hub on 2026-04-26.
    # Tag check: gh api hub.docker.com/v2/repositories/minio/minio/tags/<tag>
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mybookkeeper-minio
    restart: unless-stopped
    ports:
      # Bind only to localhost — the docker-network Caddy is the single
      # public route to the storage subdomain. SSH tunnel for the console.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      # Dev defaults — production OVERRIDES these via /srv/myfreeapps/.env.
      # Never use these credentials in production: see deploy/MINIO_SETUP.md.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_KMS_AUTO_ENCRYPTION: "on"
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-key1:V0VBSyBERVYgS0VZIC0gUkVQTEFDRSBJTiBQUk9EICAgIA==}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_URL:-http://localhost:9001}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: always
    env_file: backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
      RUN_UPLOAD_WORKER: "false"
      FRONTEND_DIST_DIR: /srv/frontend
      # MinIO connection — sourced from root .env (same place the minio service reads from)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET}
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS}
    volumes:
      - frontend_dist:/srv/frontend
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  upload-processor:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: always
    command: ["python", "-m", "app.workers.upload_processor_worker"]
    env_file: backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: always
    command: ["python", "-m", "app.workers.scheduler_worker"]
    env_file: backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://mybookkeeper:${DB_PASSWORD}@postgres/mybookkeeper
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      # Bind only to localhost — host Caddy is the public front door and proxies here.
      # Port 80/443 on the host are owned by host Caddy; this container is HTTP-only on 8094.
      - "127.0.0.1:8094:80"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile.docker:/etc/caddy/Caddyfile
      - frontend_dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  frontend_dist:
  caddy_data:
  caddy_config:
  minio_data:
