services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: myrestaurantreviews
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: myrestaurantreviews
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myrestaurantreviews"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: apps/myrestaurantreviews/docker/backend.Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://myrestaurantreviews:${DB_PASSWORD}@postgres/myrestaurantreviews
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: apps/myrestaurantreviews/docker/backend.Dockerfile
    restart: always
    env_file: backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://myrestaurantreviews:${DB_PASSWORD}@postgres/myrestaurantreviews
      FRONTEND_DIST_DIR: /srv/frontend
    volumes:
      - frontend_dist:/srv/frontend
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "8090:80"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile.docker:/etc/caddy/Caddyfile
      - frontend_dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  frontend_dist:
  caddy_data:
  caddy_config:
