[pytest]
asyncio_mode = auto
# Share a single asyncio event loop across all tests in the session so the
# module-level async engine in ``app.db.session`` (created at import time
# from the loop pytest-asyncio first runs) remains valid across tests.
# Without this, asyncpg connections raise "Future attached to a different
# loop" the moment a test uses ``unit_of_work`` or ``AsyncSessionLocal``.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
