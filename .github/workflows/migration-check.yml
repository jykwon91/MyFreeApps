name: Migration Check

on:
  pull_request:
    paths:
      - 'apps/mybookkeeper/backend/alembic/**'

jobs:
  check-single-head:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd apps/mybookkeeper/backend
          pip install -q alembic sqlalchemy pydantic pydantic-settings

      - name: Check for multiple Alembic heads
        run: |
          cd apps/mybookkeeper/backend
          heads=$(PYTHONPATH=. alembic heads 2>/dev/null | wc -l)
          if [ "$heads" -gt 1 ]; then
            echo "::error::Multiple Alembic heads detected. Rebase onto main and regenerate your migration."
            PYTHONPATH=. alembic heads
            exit 1
          fi
          echo "Single migration head confirmed."
