name: Deploy MyJobHunter

on:
  push:
    branches: [main]
    paths:
      - 'apps/myjobhunter/**'
      - 'packages/**'

concurrency:
  group: deploy-myjobhunter
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy to VPS
        uses: appleboy/ssh-action@7eaf76671a0d7b0e8e43c4da68a9062720ab5174 # v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /srv/myjobhunter

            echo "--- Pull latest code ---"
            git pull --ff-only

            echo "--- Build and deploy with Docker ---"
            docker compose -f apps/myjobhunter/docker-compose.yml build
            docker compose -f apps/myjobhunter/docker-compose.yml up -d --remove-orphans

            echo "--- Run database migrations ---"
            docker compose -f apps/myjobhunter/docker-compose.yml exec -T api alembic upgrade head

            echo "--- Wait for API health check ---"
            for i in $(seq 1 30); do
              if docker compose -f apps/myjobhunter/docker-compose.yml exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" 2>/dev/null; then
                echo "API is healthy"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "API health check failed after 30 attempts"
                docker compose -f apps/myjobhunter/docker-compose.yml logs api --tail=50
                exit 1
              fi
              sleep 2
            done

            echo "--- Done ---"
