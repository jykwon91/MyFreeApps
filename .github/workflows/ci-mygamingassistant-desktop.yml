name: MyGamingAssistant Desktop CI

# Builds the Tauri desktop binary on Linux, macOS, and Windows.
#
# This workflow runs in parallel with the existing deploy-mygamingassistant.yml
# (which ships the web app). PR 7 only adds this new workflow; it does not
# change or replace any existing deploy path.
#
# Signing / notarization: deferred. Binaries are uploaded as workflow artifacts
# only. Operator setup will be needed before public distribution:
#   - Windows: Authenticode certificate + signtool.exe call in tauri-action
#   - macOS:   Apple Developer ID cert + notarization via altool / notarytool
#   - Linux:   no signing (or optional Snap/Flatpak publishing later)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/mygamingassistant/desktop/**'
      - 'apps/mygamingassistant/frontend/**'
      - 'packages/shared-frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-mygamingassistant-desktop.yml'
  push:
    branches: [main]
    paths:
      - 'apps/mygamingassistant/desktop/**'
      - 'apps/mygamingassistant/frontend/**'
      - 'packages/shared-frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-mygamingassistant-desktop.yml'

permissions:
  contents: read

concurrency:
  group: ci-mygamingassistant-desktop-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build / ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      # One platform failure should not cancel the others — we want to see
      # the full matrix status on every run.
      fail-fast: false
      matrix:
        platform:
          - name: linux-x64
            runner: ubuntu-22.04
            # Tauri's Linux webview requires GTK/WebKit system libraries.
            # See https://tauri.app/start/prerequisites/#linux for the
            # canonical list. Pinned to apt packages available in 22.04.
            # `>-` folds newlines into single spaces (vs `|` which preserves
            # them and breaks apt-get into per-line commands).
            apt-deps: >-
              libwebkit2gtk-4.1-dev
              libssl-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              build-essential
              curl
              wget
              file
              libgtk-3-dev
              libxdo-dev
          - name: macos-arm64
            runner: macos-latest
            apt-deps: ''
          - name: windows-x64
            runner: windows-latest
            apt-deps: ''

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux system dependencies (webkit2gtk)
        if: matrix.platform.runner == 'ubuntu-22.04'
        # Tauri needs webkit2gtk + a few X11/desktop integration libs.
        # Listed in matrix.platform.apt-deps so the package set is visible
        # at the matrix definition, not buried in step shell script.
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086
          sudo apt-get install -y ${{ matrix.platform.apt-deps }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain (stable)
        # dtolnay/rust-toolchain pinned to the stable-branch tip. The @rev
        # is the toolchain selector — pinning to a SHA freezes which
        # `stable` snapshot we install. Bump the SHA periodically to pick
        # up new stable releases.
        # https://github.com/dtolnay/rust-toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-13

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Cache key is partitioned by platform so a Windows build doesn't
          # pollute the Linux cache and vice-versa.
          workspaces: apps/mygamingassistant/desktop/src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: Install workspace dependencies
        # Root package.json is an npm workspace. The desktop dir is now part
        # of the workspace glob (`apps/*/desktop`), so this installs both
        # the frontend Vite stack AND the Tauri CLI in one shot.
        # See apps/mybookkeeper CI for the `npm install` vs `npm ci` rationale.
        run: npm install

      - name: Build frontend bundle
        # tauri-action's `beforeBuildCommand` (in tauri.conf.json) builds the
        # frontend, but doing it explicitly here surfaces frontend errors
        # before Rust compilation starts (much faster feedback).
        run: npm run build --workspace=apps/mygamingassistant/frontend

      - name: Build desktop binary (tauri-action)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        with:
          # Project paths relative to repo root. The action invokes
          # `cargo tauri build` from this directory.
          projectPath: apps/mygamingassistant/desktop
          # The Tauri CLI's `beforeBuildCommand` would re-run the frontend
          # build, but we already did it above. Skip by passing --no-build.
          # However tauri-action doesn't support --no-build; instead rely on
          # Vite's content-hashed dist/ being idempotent for the re-run.
          tagName: ''  # Don't auto-create a release; this is CI-only.
          releaseName: ''
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload Linux bundles
        if: matrix.platform.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mygamingassistant-${{ matrix.platform.name }}-${{ github.sha }}
          # Linux outputs both .deb and .AppImage by default; .rpm if rpmbuild
          # is available (it isn't on the Ubuntu runner, so this glob is
          # tolerant of missing files).
          path: |
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS bundles
        if: matrix.platform.runner == 'macos-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mygamingassistant-${{ matrix.platform.name }}-${{ github.sha }}
          path: |
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows bundles
        if: matrix.platform.runner == 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mygamingassistant-${{ matrix.platform.name }}-${{ github.sha }}
          path: |
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/mygamingassistant/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  rust-checks:
    # Cheap Rust-only checks that don't need the full bundle build.
    # Run on Linux only (results are platform-independent for a pure-Rust
    # smoke test). PR 8 added `cargo test` once GSI gave us a real test
    # surface to exercise (parser + installer + axum router unit/integration).
    name: rust-checks / linux-x64
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux system dependencies
        # `cargo check` still links against webkit2gtk, so the same system
        # deps are required as the full build job.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libgtk-3-dev \
            libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-13
        with:
          components: rustfmt, clippy

      - name: Set up Node
        # Tauri's `generate_context!()` macro validates that the configured
        # `frontendDist` directory exists at compile time. We need to build
        # the SPA before running clippy (which expands the macro).
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm install

      - name: Build frontend bundle
        # Produces apps/mygamingassistant/frontend/dist, satisfying Tauri's
        # `frontendDist: "../../frontend/dist"` validation in tauri.conf.json.
        run: npm run build --workspace=apps/mygamingassistant/frontend

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/mygamingassistant/desktop/src-tauri -> target
          key: linux-x64-checks

      - name: cargo fmt --check
        working-directory: apps/mygamingassistant/desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: apps/mygamingassistant/desktop/src-tauri
        # `-D warnings` flips clippy lints into hard errors, matching the
        # MBK + MJH frontend lint policy.
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        working-directory: apps/mygamingassistant/desktop/src-tauri
        # Runs both the in-crate unit tests (under `#[cfg(test)] mod tests`)
        # and the standalone integration tests in `tests/`. The latter
        # exercises the real axum + tokio TCP listener.
        run: cargo test --all-features
