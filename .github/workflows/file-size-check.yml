name: File Size Check

# Prevents source files from silently growing past safe LOC thresholds.
# See scripts/check-file-size.py for the rules and scripts/file-size-allowlist.yml
# for the list of explicitly permitted large files.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: file-size-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check-file-size
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # required so git show origin/<base>:<path> resolves

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run file-size check
        run: python scripts/check-file-size.py --base origin/${{ github.base_ref }}
