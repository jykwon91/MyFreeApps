name: MyJobHunter CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/myjobhunter/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-myjobhunter.yml'
  push:
    branches: [main]
    paths:
      - 'apps/myjobhunter/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-myjobhunter.yml'

permissions:
  contents: read

concurrency:
  group: ci-myjobhunter-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-deps-resolve:
    name: backend-deps-resolve / myjobhunter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/myjobhunter/backend/requirements.txt

      - name: Resolve backend requirements
        working-directory: apps/myjobhunter/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  backend-tests:
    name: backend-tests / myjobhunter / ${{ matrix.shard.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        shard:
          # The auth suite is dominated by Argon2 password hashing — the slow
          # tests are the ones that issue many login attempts (account
          # lockout, per-IP rate limit, account deletion re-auth, data
          # export login). Splitting by file across three shards keeps any
          # single shard inside the 10-min timeout and lets them run in
          # parallel.
          - name: fast
            paths: >-
              tests/test_health.py
              tests/test_auth.py
              tests/test_hibp_validation.py
              tests/test_turnstile.py
              tests/test_tenant_isolation.py
              tests/test_audit.py
          - name: login-heavy
            paths: >-
              tests/test_account_lockout.py
              tests/test_login_ip_rate_limit.py
              tests/test_account_deletion.py
              tests/test_data_export.py
          - name: totp
            paths: >-
              tests/test_totp_login.py
              tests/test_totp_setup.py

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/test
      SECRET_KEY: placeholder-not-real-secret-key # gitleaks:allow
      ENCRYPTION_KEY: placeholder-not-real-encryption-key # gitleaks:allow
      ANTHROPIC_API_KEY: sk-ant-placeholder-not-real
      TAVILY_API_KEY: tvly-placeholder-not-real
      GOOGLE_CLIENT_ID: placeholder-not-real-google-client
      GOOGLE_CLIENT_SECRET: placeholder-not-real-google-secret

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/myjobhunter/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: apps/myjobhunter/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ../../../packages/shared-backend

      - name: Run alembic migrations
        working-directory: apps/myjobhunter/backend
        run: PYTHONPATH=. alembic upgrade head

      - name: Run pytest (${{ matrix.shard.name }})
        working-directory: apps/myjobhunter/backend
        # -v shows test names as they enter setup/call/teardown
        # --timeout=30 + --timeout-method=thread dumps the full Python
        # stack of the hung thread (including app frames) instead of
        # just the asyncio loop frame.
        # --tb=long preserves the entire traceback chain.
        run: python -m pytest -v -s --timeout=30 --timeout-method=thread --tb=long ${{ matrix.shard.paths }}

  frontend-build:
    name: frontend-build / myjobhunter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        # Root package.json is an npm workspace covering all apps' frontends.
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=myjobhunter-frontend
