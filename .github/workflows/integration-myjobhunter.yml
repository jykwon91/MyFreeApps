name: MyJobHunter Integration

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/myjobhunter/**'
      - 'packages/**'
  push:
    branches: [main]
    paths:
      - 'apps/myjobhunter/**'
      - 'packages/**'

permissions:
  contents: read

concurrency:
  group: integration-myjobhunter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stack-smoke:
    name: Stack smoke (compose up + health + login)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node (for frontend E2E smoke)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Write ephemeral .env.docker for backend
        run: |
          mkdir -p apps/myjobhunter/backend
          cat > apps/myjobhunter/backend/.env.docker <<EOF
          DATABASE_URL=postgresql+asyncpg://myjobhunter:integration_pw@postgres/myjobhunter
          DATABASE_URL_SYNC=postgresql://myjobhunter:integration_pw@postgres/myjobhunter
          SECRET_KEY=integration-test-secret-do-not-use-in-production-0123456789abcdef
          ENCRYPTION_KEY=dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcy0wMDAwMDAx
          ANTHROPIC_API_KEY=sk-ant-integration-placeholder
          TAVILY_API_KEY=tvly-integration-placeholder
          GOOGLE_CLIENT_ID=integration-placeholder
          GOOGLE_CLIENT_SECRET=integration-placeholder
          CORS_ORIGINS=["http://localhost:8092"]
          JWT_LIFETIME_SECONDS=1800
          LOG_LEVEL=INFO
          EOF

      - name: Build and start stack
        working-directory: apps/myjobhunter
        env:
          DB_PASSWORD: integration_pw
          DOMAIN: http://localhost
        run: |
          docker compose up -d --build
          echo "Waiting for stack to become healthy..."

      - name: Wait for api health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8092/api/health > /dev/null 2>&1; then
              echo "Stack is healthy"
              curl -s http://localhost:8092/api/health
              exit 0
            fi
            sleep 2
          done
          echo "Stack did not become healthy in 120 seconds" >&2
          docker compose -f apps/myjobhunter/docker-compose.yml logs --tail=100 >&2
          exit 1

      - name: Verify frontend is served
        run: |
          curl -fsS -o /tmp/index.html http://localhost:8092/
          grep -q "<html" /tmp/index.html
          echo "Frontend HTML served correctly"

      - name: Verify security response headers
        # Asserts apps/myjobhunter/docker/Caddyfile.docker is emitting the
        # five security headers required for parity with MyBookkeeper.
        # Header lookups are case-insensitive (curl -I lower-cases names).
        run: |
          set -e
          HEADERS=$(curl -fsSI http://localhost:8092/ | tr -d '\r')
          echo "$HEADERS"

          echo "$HEADERS" | grep -i '^Strict-Transport-Security:' \
            | grep -q 'max-age=63072000' \
            || (echo "Missing or wrong HSTS header" && exit 1)

          echo "$HEADERS" | grep -iq '^X-Frame-Options:.*DENY' \
            || (echo "Missing or wrong X-Frame-Options header" && exit 1)

          echo "$HEADERS" | grep -iq '^X-Content-Type-Options:.*nosniff' \
            || (echo "Missing or wrong X-Content-Type-Options header" && exit 1)

          echo "$HEADERS" | grep -iq '^Referrer-Policy:.*strict-origin-when-cross-origin' \
            || (echo "Missing or wrong Referrer-Policy header" && exit 1)

          echo "$HEADERS" | grep -iq "^Content-Security-Policy:.*default-src 'self'" \
            || (echo "Missing or wrong Content-Security-Policy header" && exit 1)

          # Phase 1 CSP must NOT contain 'unsafe-inline' for scripts.
          # If this ever fires, someone added a third-party script integration
          # without splitting the script-src directive — fail loud.
          if echo "$HEADERS" | grep -i '^Content-Security-Policy:' \
              | grep -Eq "script-src[^;]*'unsafe-inline'"; then
            echo "CSP regression: script-src must never contain 'unsafe-inline'" >&2
            exit 1
          fi

          # Server header should be stripped.
          if echo "$HEADERS" | grep -iq '^Server:'; then
            echo "Server header was not stripped" >&2
            exit 1
          fi

          echo "All security headers present and correctly configured."

      - name: Smoke — register + login
        run: |
          EMAIL="ci-$(date +%s)@myjobhunter-test.invalid"
          PASSWORD="integration_password_12_chars"
          REGISTER_RES=$(curl -fsS -X POST http://localhost:8092/api/auth/register \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")
          echo "Registered: $REGISTER_RES" | head -c 200; echo
          LOGIN_RES=$(curl -fsS -X POST http://localhost:8092/api/auth/jwt/login \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -d "username=$EMAIL&password=$PASSWORD")
          echo "$LOGIN_RES" | grep -q "access_token"
          echo "Login returned access_token"

      - name: Dump logs on failure
        if: failure()
        working-directory: apps/myjobhunter
        run: |
          docker compose logs --tail=200 || true

      - name: Tear down
        if: always()
        working-directory: apps/myjobhunter
        run: |
          docker compose down -v || true
