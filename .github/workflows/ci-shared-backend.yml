name: Shared Backend CI

# Runs the platform_shared package's own unit tests on every PR that touches
# packages/shared-backend, plus on pushes to main. Apps that consume this
# package (MyBookkeeper, MyJobHunter) have their own CI workflows that pin
# the package and re-run the consuming app's tests.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/shared-backend/**'
      - '.github/workflows/ci-shared-backend.yml'
  push:
    branches: [main]
    paths:
      - 'packages/shared-backend/**'
      - '.github/workflows/ci-shared-backend.yml'

permissions:
  contents: read

concurrency:
  group: ci-shared-backend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    name: shared-backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install shared-backend with dev extras
        working-directory: packages/shared-backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: packages/shared-backend
        run: python -m pytest -q
