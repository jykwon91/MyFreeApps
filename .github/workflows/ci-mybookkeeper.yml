name: MyBookkeeper CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/mybookkeeper/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-mybookkeeper.yml'
  push:
    branches: [main]
    paths:
      - 'apps/mybookkeeper/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-mybookkeeper.yml'

permissions:
  contents: read

concurrency:
  group: ci-mybookkeeper-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-deps-resolve:
    name: backend-deps-resolve / mybookkeeper
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/mybookkeeper/backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Verify lockfile is consistent with pyproject.toml
        working-directory: apps/mybookkeeper/backend
        run: uv lock --check

      - name: Sync backend dependencies from lockfile
        working-directory: apps/mybookkeeper/backend
        run: uv sync --frozen

  backend-tests:
    name: backend-tests / mybookkeeper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/mybookkeeper/backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Sync backend dependencies
        working-directory: apps/mybookkeeper/backend
        run: uv sync --frozen

      - name: Install test-only dependencies
        working-directory: apps/mybookkeeper/backend
        # Test deps are not pinned in pyproject.toml; install into the uv venv.
        # Mirrors the standalone repo's CI pattern (pytest + pytest-asyncio + aiosqlite).
        run: uv pip install pytest pytest-asyncio aiosqlite

      - name: Install shared-backend package
        # platform_shared lives at packages/shared-backend and is imported by
        # apps/mybookkeeper/backend (auth events, HIBP, Turnstile, etc.).
        # Install into the same uv venv so MBK's tests can resolve it.
        working-directory: apps/mybookkeeper/backend
        run: uv pip install ../../../packages/shared-backend

      - name: Run pytest
        working-directory: apps/mybookkeeper/backend
        env:
          # Dummy values — tests use in-memory sqlite, not these envs, but pydantic-settings may require them.
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DATABASE_URL_SYNC: "sqlite:///:memory:"
          SECRET_KEY: placeholder-not-real-secret-key # gitleaks:allow
          ENCRYPTION_KEY: placeholder-not-real-encryption-key # gitleaks:allow
          ANTHROPIC_API_KEY: sk-ant-placeholder-not-real
          GOOGLE_CLIENT_ID: placeholder-not-real-google-client
          GOOGLE_CLIENT_SECRET: placeholder-not-real-google-secret
        run: uv run pytest -q -m "not integration"

  frontend-build:
    name: frontend-build / mybookkeeper
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        # Root package.json is an npm workspace covering all apps' frontends.
        # Use `npm install` rather than `npm ci`: there is a known npm bug
        # (https://github.com/npm/cli/issues/4828) where workspace + optional
        # platform-specific deps (rollup, esbuild) interact badly with the
        # strict lockfile validation in `npm ci`, producing
        # `Cannot find module '@rollup/rollup-linux-x64-gnu'` failures even
        # when the lockfile has the entry. `npm install` is more lenient
        # and self-heals.
        run: npm install

      - name: Build frontend
        run: npm run build --workspace=mybookkeeper-frontend

  frontend-layout-e2e:
    name: frontend-layout-e2e / mybookkeeper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Layout tests fully mock their API surface via page.route() and read
    # files directly off disk (e.g. Caddyfile contract test). No backend
    # required. Catches the class of bug that 2026-05-01 surfaced manually:
    # local Button missing justify-center, Caddyfile XFO/CSP scoping wrong,
    # iframe rendering regressions.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        # See frontend-build job above for why npm install vs npm ci.
        run: npm install

      - name: Install Playwright Chromium
        working-directory: apps/mybookkeeper/frontend
        run: npx playwright install --with-deps chromium

      - name: Run layout E2E tests (no backend)
        working-directory: apps/mybookkeeper/frontend
        # Uses the layout-only Playwright config which skips globalSetup
        # (no backend dependency) and webServer-starts a Vite dev server.
        # Excludes the headed-Chrome tests (channel: chrome + headless:false)
        # that require a full Chrome install — those run only locally for now.
        run: npx playwright test --config=playwright.layout.config.ts --grep-invert "PDF iframe rendering under the production CSP|Headers on download response — blob iframe rendering"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: apps/mybookkeeper/frontend/e2e/test-results/
          retention-days: 7
