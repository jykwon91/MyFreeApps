version: 2
updates:
  # Python dependencies for each backend
  - package-ecosystem: "pip"
    directory: "/apps/myjobhunter/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "myjobhunter"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/packages/shared-backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "shared"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # npm dependencies for each frontend
  - package-ecosystem: "npm"
    directory: "/apps/myjobhunter/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "myjobhunter"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @types/node must track the Node runtime, not leap ahead. Major bumps
      # (e.g. 25 -> 26) desync the lock / break tsc against the version we
      # actually run. Allow minor+patch; hold majors until the runtime moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/packages/shared-frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "shared"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @types/node must track the Node runtime, not leap ahead. Major bumps
      # (e.g. 25 -> 26) desync the lock / break tsc against the version we
      # actually run. Allow minor+patch; hold majors until the runtime moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]

  - package-ecosystem: "pip"
    directory: "/apps/mybookkeeper/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "mybookkeeper"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/apps/mybookkeeper/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "mybookkeeper"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @types/node must track the Node runtime, not leap ahead. Major bumps
      # (e.g. 25 -> 26) desync the lock / break tsc against the version we
      # actually run. Allow minor+patch; hold majors until the runtime moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Docker base images (one per app as docker-compose files are added)
  - package-ecosystem: "docker"
    directory: "/apps/myjobhunter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker", "myjobhunter"]

  - package-ecosystem: "docker"
    directory: "/apps/mybookkeeper"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker", "mybookkeeper"]

  # MyRecipes (multi-user)
  - package-ecosystem: "pip"
    directory: "/apps/myrecipes/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "myrecipes"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/apps/myrecipes/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "myrecipes"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @types/node must track the Node runtime, not leap ahead. Major bumps
      # (e.g. 25 -> 26) desync the lock / break tsc against the version we
      # actually run. Allow minor+patch; hold majors until the runtime moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/apps/myrecipes"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker", "myrecipes"]
