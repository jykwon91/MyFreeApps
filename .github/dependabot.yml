version: 2
updates:
  # Python dependencies for each backend
  - package-ecosystem: "pip"
    directory: "/apps/myjobhunter/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "myjobhunter"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/packages/shared-backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python", "shared"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # npm dependencies for each frontend
  - package-ecosystem: "npm"
    directory: "/apps/myjobhunter/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "myjobhunter"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/packages/shared-frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm", "shared"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]

  # Docker base images (one per app as docker-compose files are added)
  - package-ecosystem: "docker"
    directory: "/apps/myjobhunter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker", "myjobhunter"]
