[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "platform-shared"
version = "0.1.0"
description = "Shared backend infrastructure for MyFreeApps"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "sqlalchemy>=2.0.36",
    "asyncpg>=0.30.0",
    "cryptography>=43.0.0",
    "minio>=7.2.0",
    "pyotp>=2.9.0",
    "qrcode>=7.4.2",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[tool.setuptools.packages.find]
include = ["platform_shared*"]
