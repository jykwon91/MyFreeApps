[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "platform-shared"
version = "0.1.0"
description = "Shared backend infrastructure for MyFreeApps"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "sqlalchemy>=2.0.36",
    "asyncpg>=0.30.0",
    "cryptography>=43.0.0",
    "minio>=7.2.0",
    "pyotp>=2.9.0",
    "pyjwt>=2.9.0",
    "qrcode>=7.4.2",
    "pydantic[email]>=2.9.0",
    "pydantic-settings>=2.5.0",
    "httpx>=0.27.0",
    "sentry-sdk>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "aiosqlite>=0.20.0",
    # Required by platform_shared.infra.render and platform_shared.infra.new_app.
    # Dev-only: never imported from request handlers.
    "jinja2>=3.1.0",
    "pyyaml>=6.0.0",
    # Required for tests of platform_shared.services.sms_service that need to
    # patch the Twilio Client / TwilioRestException. Runtime apps that use
    # SMS pull twilio in via their own pyproject.toml deps.
    "twilio>=9.10.0",
    # Required for tests of platform_shared.extraction (patch
    # anthropic.AsyncAnthropic; parse real PDF/DOCX/XLSX fixtures).
    # Runtime apps that extract pull these in via their own pyproject.toml.
    "anthropic>=0.100.0",
    "pypdf>=5.6",
    "mammoth>=1.12.0",
    "openpyxl>=3.1.5",
    # Required for tests of platform_shared.auth.jwt_backend that exercise
    # the real JWTStrategy write/read paths. Runtime apps that authenticate
    # pull fastapi-users in via their own pyproject.toml.
    "fastapi-users[sqlalchemy]>=15.0,<16.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.setuptools.packages.find]
include = ["platform_shared*"]
